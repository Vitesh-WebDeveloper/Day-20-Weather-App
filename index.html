<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App API</title>
  <link rel="stylesheet" href="day20-weather-app.css">
  <script src="day20-weather-app.js" defer></script>
</head>
<body>
  <div class="container">
    <input id="cityInput" placeholder="Enter city (e.g. Hyderabad)" />
    <button id="searchBtn">Search</button>

    <p id="loading"></p>
    <p id="error"></p>

    <div id="weatherCard">
      <h2 id="cityName"></h2>
      <p id="temperature"></p>
      <p id="condition"></p>
    </div>
  </div>
</body>
</html>
